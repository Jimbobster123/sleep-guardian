  <!-- Zzz -->
  <text x="110" y="60" font-size="14" fill="#c9c6ff" font-family="sans-serif">Z</text>
  <text x="122" y="48" font-size="12" fill="#c9c6ff" font-family="sans-serif">z</text>

  <!-- App name -->
  <text x="210" y="95" font-size="56" fill="#ffffff" font-family="sans-serif" letter-spacing="6" font-weight="600">
        LUNA
  </text>

  <!-- subtle stars -->
  <circle cx="450" cy="50" r="2" fill="#c9c6ff"></circle>
  <circle cx="480" cy="80" r="1.8" fill="#c9c6ff"></circle>
  <circle cx="430" cy="100" r="1.5" fill="#c9c6ff"></circle>
</svg>